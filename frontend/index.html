<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quanta · Vietnam Stock Price Prediction</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(31,138,91,0.06), transparent 60%),
      radial-gradient(800px 400px at 90% 110%, rgba(180,122,14,0.05), transparent 60%),
      var(--bg);
    overflow: hidden;
  }

  .welcome {
    width: min(820px, 92vw);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    padding: 48px 24px;
    position: relative;
  }

  .welcome .brand-line {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px 6px 6px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    box-shadow: var(--shadow-1);
  }
  .welcome .brand-line .brand-mark {
    width: 22px; height: 22px;
    border-radius: 6px;
    font-size: 11px;
  }
  .welcome .brand-line .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-2);
  }

  .welcome .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-3);
    text-transform: uppercase;
  }

  .welcome h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(40px, 6.4vw, 72px);
    line-height: 1.12;
    padding-bottom: 6px;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0;
    text-wrap: balance;
  }
  .welcome h1 .accent-word {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .welcome .sub {
    font-size: 15px;
    color: var(--ink-2);
    max-width: 520px;
    line-height: 1.55;
    margin: -8px 0 0;
  }

  .cta-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }

  .cta {
    --pad-x: 28px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    min-width: 240px;
    padding: 16px var(--pad-x);
    border-radius: 14px;
    border: 1px solid var(--line-2);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
    transition:
      transform var(--t-fast),
      background var(--t-fast),
      border-color var(--t-fast),
      box-shadow var(--t-med);
    box-shadow: var(--shadow-1);
  }
  .cta:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-2);
  }
  .cta:active { transform: translateY(0); }

  .cta .icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface-2);
    display: grid; place-items: center;
    color: var(--ink);
    flex-shrink: 0;
  }
  .cta .text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .cta .title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.005em;
  }
  .cta .desc {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .cta .arrow {
    margin-left: 6px;
    color: var(--ink-3);
    transition: transform var(--t-fast), color var(--t-fast);
  }
  .cta:hover .arrow {
    color: var(--ink);
    transform: translateX(4px);
  }

  .cta.primary {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }
  .cta.primary .icon {
    background: rgba(255,255,255,0.10);
    color: #fff;
  }
  .cta.primary .desc { color: rgba(255,255,255,0.55); }
  .cta.primary .arrow { color: rgba(255,255,255,0.6); }
  .cta.primary:hover .arrow { color: #fff; }

  .footer-meta {
    position: absolute;
    bottom: 22px;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .footer-meta .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 0 4px rgba(31,138,91,0.12);
  }
  .footer-meta .sep {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--ink-4);
  }

  /* Subtle backdrop grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(14,21,16,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(14,21,16,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }
  .welcome { position: relative; z-index: 1; }
</style>
</head>
<body data-accent="green" data-fontpair="grotesk">

<div class="welcome">
  <div class="brand-line">
    <span class="brand-mark"></span>
    <span class="label">Quanta · VN Markets</span>
  </div>

  <div class="eyebrow">Welcome</div>

  <h1>
    Vietnam Stock Price Prediction
  </h1>

  <p class="sub">
    Forecast price trajectories and surface actionable buy/sell signals across
    HOSE, HNX, and UPCOM &mdash; in one quiet, focused workspace.
  </p>

  <div class="cta-row">
    <a class="cta primary" href="predict.html">
      <span class="icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l5-5 4 4 8-8" />
          <path d="M14 8h6v6" />
        </svg>
      </span>
      <span class="text">
        <span class="title">Predict</span>
        <span class="desc">Forecast price · K-day horizon</span>
      </span>
      <span class="arrow" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="M13 5l7 7-7 7" />
        </svg>
      </span>
    </a>

    <a class="cta" href="signals.html">
      <span class="icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19V5" />
          <path d="M4 19h16" />
          <path d="M8 15l3-4 3 2 4-6" />
        </svg>
      </span>
      <span class="text">
        <span class="title">Signals</span>
        <span class="desc">Buy &amp; sell opportunities</span>
      </span>
      <span class="arrow" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="M13 5l7 7-7 7" />
        </svg>
      </span>
    </a>
  </div>
</div>

<div class="footer-meta">
  <span class="dot"></span>
  <span>HOSE · HNX · UPCOM</span>
  <span class="sep"></span>
  <span>v1.0</span>
</div>

</body>
</html>
